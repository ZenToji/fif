<section class="about-gallery">
  <div class="container about-gallery__container">
    <div class="about-gallery__slider swiper">
      <div class="about-gallery__slider-btns">
        <button class="about-gallery__slider-btns-prev" aria-label="Previous slide">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M7.5 1.5L3 6L7.5 10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="about-gallery__slider-btns-next" aria-label="Next slide">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M4.5 1.5L9 6L4.5 10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="swiper-wrapper">

        <div class="swiper-slide about-gallery__card">
          <div class="about-gallery__card-image">
            <img src="./image/about/slider1.jpg" alt="Gallery 1" />
          </div>
        </div>

        <div class="swiper-slide about-gallery__card">
          <div class="about-gallery__card-image">
            <img src="./image/about/slider2.jpg" alt="What we believe in" />
          </div>
          <div class="about-gallery__card-content">
            <h3 class="about-gallery__card-title">What we believe in</h3>
            <p class="about-gallery__card-desc">Over the years at Sans, we've put a lot of thought into what it is that makes us who we are. The qualities that unite us, that make us such an effective team, and...</p>
            <a href="#" class="about-gallery__card-btn button-form">See Details &rarr;</a>
          </div>
        </div>

        <div class="swiper-slide about-gallery__card">
          <div class="about-gallery__card-image">
            <img src="./image/about/slider3.jpg" alt="Gallery 3" />
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
